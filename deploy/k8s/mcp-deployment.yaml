apiVersion: apps/v1
kind: Deployment
metadata:
  name: huginn-mcp
  namespace: huginn
  labels:
    app: huginn-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: huginn-mcp
  template:
    metadata:
      labels:
        app: huginn-mcp
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10002
      containers:
        - name: mcp
          image: ghcr.io/cronos-website/huginn-mcp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9000
          env:
            # HUGINN_MCP_SERVICE_TOKEN comes from the shared secret.
            - name: HUGINN_MCP_HUB_URL
              value: "http://huginn-hub"
            - name: HUGINN_MCP_TRANSPORT
              value: "streamable-http"
            - name: HUGINN_MCP_HOST
              value: "0.0.0.0"
            - name: HUGINN_MCP_PORT
              value: "9000"
          envFrom:
            - secretRef:
                name: huginn-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: huginn-mcp
  namespace: huginn
  labels:
    app: huginn-mcp
spec:
  selector:
    app: huginn-mcp
  ports:
    - name: http
      port: 80
      targetPort: 9000
  type: ClusterIP
