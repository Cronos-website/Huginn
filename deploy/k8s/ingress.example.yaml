# Example ingress. Routes the dashboard, hub API, and MCP under one host. TLS is
# terminated here (cert-manager annotation shown). Adjust ingressClassName and
# the host to your environment. The hub must allow the dashboard origin via
# HUGINN_CORS_ORIGINS, and the dashboard image must be built with
# VITE_HUB_URL=https://<host>.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: huginn
  namespace: huginn
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["huginn.example.com"]
      secretName: huginn-tls
  rules:
    - host: huginn.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: huginn-hub
                port:
                  number: 80
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: huginn-hub
                port:
                  number: 80
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: huginn-mcp
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: huginn-dashboard
                port:
                  number: 80
