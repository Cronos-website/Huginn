apiVersion: apps/v1
kind: Deployment
metadata:
  name: huginn-hub
  namespace: huginn
  labels:
    app: huginn-hub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: huginn-hub
  template:
    metadata:
      labels:
        app: huginn-hub
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: hub
          image: ghcr.io/cronos-website/huginn-hub:latest
          imagePullPolicy: IfNotPresent
          # `command` overrides the image entrypoint (which would otherwise run
          # migrations per-pod) — migrations are handled by huginn-migrate Job.
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: huginn-secrets
          env:
            - name: HUGINN_ENV
              value: "prod"
            - name: HUGINN_REQUIRE_TLS
              value: "true"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
