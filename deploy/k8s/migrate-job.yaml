# Run database migrations once, before/independently of the hub replicas.
# Apply this (and wait for completion) on each upgrade:
#   kubectl -n huginn apply -f migrate-job.yaml
#   kubectl -n huginn wait --for=condition=complete job/huginn-migrate --timeout=120s
apiVersion: batch/v1
kind: Job
metadata:
  name: huginn-migrate
  namespace: huginn
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: huginn-migrate
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: migrate
          image: ghcr.io/cronos-website/huginn-hub:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: huginn-secrets
          env:
            - name: HUGINN_ENV
              value: "prod"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
