# Example secrets for the Huginn hub. Copy, fill with real values
# (openssl rand -hex 32), and apply. NEVER commit the filled-in version.
apiVersion: v1
kind: Secret
metadata:
  name: huginn-secrets
  namespace: huginn
type: Opaque
stringData:
  HUGINN_DATABASE_URL: postgresql+asyncpg://huginn:CHANGE_ME@postgres.example:5432/huginn
  HUGINN_JWT_SECRET: CHANGE_ME_openssl_rand_hex_32
  HUGINN_SECRET_HASH_KEY: CHANGE_ME_openssl_rand_hex_32
  HUGINN_MCP_SERVICE_TOKEN: CHANGE_ME_openssl_rand_hex_32
  HUGINN_BOOTSTRAP_ADMIN_PASSWORD: CHANGE_ME_on_first_login
