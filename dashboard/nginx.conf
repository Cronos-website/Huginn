server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA history fallback. index.html must never be cached: it's the only file
  # whose name doesn't change between builds, so a stale copy pins the browser
  # to old (hashed) JS/CSS after a deploy.
  location / {
    try_files $uri $uri/ /index.html;
  }
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires -1;
  }

  # Cache hashed assets aggressively (content-hash in the filename busts cache).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
