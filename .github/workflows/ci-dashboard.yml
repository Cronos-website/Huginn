name: ci-dashboard

on:
  push:
    branches: [main]
    paths: ["dashboard/**", ".github/workflows/ci-dashboard.yml"]
  pull_request:
    paths: ["dashboard/**", ".github/workflows/ci-dashboard.yml"]

jobs:
  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm install
      - name: Lint
        run: npm run lint
      - name: Type-check & build
        run: npm run build
